name: Build EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout代码
      uses: actions/checkout@v4
    
    - name: 安装Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: pip install pyinstaller
    
    - name: 打包成EXE
      run: pyinstaller --onefile --console --add-data "mm;mm" main.py
    
    - name: 上传EXE
      uses: actions/upload-artifact@v4
      with:
        name: myapp-exe
        path: dist/*.exe
