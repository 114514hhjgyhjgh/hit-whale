name: Build EXE

on:
  push:
    tags:        # 打tag时触发，如v1.0.0
      - 'v*'
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: windows-latest   # 必须用Windows
    
    steps:
    - name: Checkout代码
      uses: actions/checkout@v4
    
    - name: 安装Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # 建议用3.8-3.11
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt  # 如果有依赖文件
    
    - name: 打包成EXE
      run: |
        pyinstaller --onefile --console your_script.py
        # 常用参数：
        # --onefile     生成单个exe
        # --console     显示控制台窗口（命令行程序）
        # --noconsole   隐藏控制台（GUI程序）
        # --icon my.ico 指定图标
        # --name myapp  指定输出文件名
    
    - name: 上传EXE到Actions产物
      uses: actions/upload-artifact@v4
      with:
        name: myapp-exe
        path: dist/*.exe
